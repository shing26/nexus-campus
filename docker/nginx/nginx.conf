# =============================================================================
# Nexus-Campus - Nginx Reverse Proxy Configuration
# =============================================================================

upstream nexus_app {
    server localhost:8080;
}

# ---- HTTP Server (redirect to HTTPS) ----
server {
    listen       80;
    server_name  localhost;

    return 301 https://System.Management.Automation.Internal.Host.InternalHost;
}

# ---- HTTPS Server ----
server {
    listen       443 ssl http2;
    server_name  localhost;

    ssl_certificate     /etc/nginx/ssl/nexus-campus.crt;
    ssl_certificate_key /etc/nginx/ssl/nexus-campus.key;

    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_ciphers               HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache         shared:SSL:10m;
    ssl_session_timeout       10m;

    # ---- Gzip Compression ----
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml
        font/woff
        font/woff2;

    # ---- Security Headers ----
    add_header X-Frame-Options          "SAMEORIGIN"   always;
    add_header X-Content-Type-Options   "nosniff"      always;
    add_header X-XSS-Protection         "1; mode=block" always;
    add_header Referrer-Policy          "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy       "camera=(), microphone=(), geolocation=()" always;

    # ---- Custom Error Pages ----
    error_page 404 /404.html;

    location = /404.html {
        root /usr/share/nginx/html;
        internal;
        add_header Cache-Control "no-store, must-revalidate";
    }

    # ---- Static Resource Caching ----
    location ~* \.(?:css|js|woff2?|ttf|otf|eot|svg|ico|png|jpg|jpeg|gif|webp)$ {
        root   /usr/share/nginx/html;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ---- API Proxy (no caching, short timeouts) ----
    location /api/ {
        proxy_pass http://nexus_app;
        proxy_set_header Host              System.Management.Automation.Internal.Host.InternalHost;
        proxy_set_header X-Real-IP         ;
        proxy_set_header X-Forwarded-For   ;
        proxy_set_header X-Forwarded-Proto ;
        proxy_http_version 1.1;
        proxy_set_header Upgrade           ;
        proxy_set_header Connection        "upgrade";
        proxy_buffering off;
        add_header Cache-Control "private, no-cache, no-store, must-revalidate";
        proxy_connect_timeout 10s;
        proxy_send_timeout    30s;
        proxy_read_timeout    30s;
    }

    # ---- Health Check Endpoint ----
    location = /actuator/health {
        proxy_pass http://nexus_app;
        proxy_set_header Host System.Management.Automation.Internal.Host.InternalHost;
        proxy_set_header X-Real-IP ;
        proxy_set_header X-Forwarded-For ;
        proxy_set_header X-Forwarded-Proto ;
        access_log off;
    }

    # ---- Main Reverse Proxy ----
    location / {
        proxy_pass http://nexus_app;
        proxy_set_header Host              System.Management.Automation.Internal.Host.InternalHost;
        proxy_set_header X-Real-IP         ;
        proxy_set_header X-Forwarded-For   ;
        proxy_set_header X-Forwarded-Proto ;
        proxy_http_version 1.1;
        proxy_set_header Upgrade           ;
        proxy_set_header Connection        "upgrade";
        proxy_buffering on;
        proxy_buffer_size 8k;
        proxy_buffers 8 8k;
        proxy_connect_timeout 30s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;
    }
}
